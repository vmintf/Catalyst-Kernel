[ir]
version = "1.3"

[opcodes]
literal      = 0x01
write_serial = 0x10
write_str     = 0x11
write_console = 0x12
write_con_str = 0x13
add_u32      = 0x30
sub_u32      = 0x31
mul_u32      = 0x32
div_u32      = 0x33
mod_u32      = 0x34
cmp_eq       = 0x35
cmp_lt       = 0x36
cmp_gt       = 0x37
mem_write    = 0x40
mem_read     = 0x41
read_port    = 0x42
write_port   = 0x44
push         = 0x45
pop          = 0x46
mem_copy     = 0x47
mem_index    = 0x43
loop         = 0x50
jmp          = 0x51
jmp_if_zero  = 0x52
jmp_if_eq    = 0x53
jmp_if_lt    = 0x54
poll_key     = 0x60
read_line    = 0x61
halt         = 0xFF

[devices]
serial = 0x3F8
vga    = 0xB8000
timer  = 0x40

[ports]
ps2_data   = 0x60
ps2_status = 0x64